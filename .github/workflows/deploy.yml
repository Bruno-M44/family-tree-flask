name: Deploy to VPS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 57389
          script: |
            cd /home/ubuntu/family-tree-flask
            git pull origin main
            echo "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" > .env
            echo "ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}" >> .env
            echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" >> .env
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build flask_app
            docker exec -i flask_db psql -U postgres -d postgres < migrations/001_birthday_nullable.sql
            docker exec -i flask_db psql -U postgres -d postgres < migrations/002_jobs_comments_nullable.sql
            docker exec -i flask_db psql -U postgres -d postgres < migrations/003_token_blocklist.sql
            docker exec -i flask_db psql -U postgres -d postgres < migrations/004_species_nullable.sql
            docker exec -i flask_db psql -U postgres -d postgres < migrations/005_pet_picture_is_main.sql
            docker exec -i flask_db psql -U postgres -d postgres < migrations/006_picture_nullable_fields.sql
            docker exec -i flask_db psql -U postgres -d postgres < migrations/007_face_detection.sql
            docker exec -i flask_db psql -U postgres -d postgres < migrations/008_user_avatar_face.sql
            docker exec -i flask_db psql -U postgres -d postgres < migrations/009_sexe.sql
            docker exec -i flask_db psql -U postgres -d postgres < migrations/010_birth_death_place.sql
            docker exec flask_app flask command_app detect-faces