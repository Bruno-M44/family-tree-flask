services:
  flask_app:
    ports:
      - "127.0.0.1:4000:4000"  # Expose uniquement sur localhost (Nginx y accède)
    environment:
      - CORS_ORIGINS=https://family-tree.io
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - FRONTEND_URL=https://family-tree.io
      - GLITCHTIP_DSN=${GLITCHTIP_DSN}