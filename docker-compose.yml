services:
  flask_app:
    container_name: flask_app
    # image: dockerhub-flask_live_app:1.0.0
    build: .
    restart: always
    environment:
      - DB_URL=postgresql+psycopg://postgres:postgres@flask_db:5432/postgres
    depends_on:
      - flask_db
    volumes:
      - /var/pictures:/pictures
      - /var/pet_pictures:/pet_pictures
      - /var/avatars:/avatars
    networks:
      - shared_network

  flask_db:
    container_name: flask_db
    image: postgres:16
    restart: always
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - shared_network

volumes:
  pgdata:

networks:
  shared_network:
    external: true
